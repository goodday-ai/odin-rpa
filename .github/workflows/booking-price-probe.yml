# 功能：手動執行 Booking Price Probe live probe，讓維運者在 GitHub Actions 下載 sanitized 價格觀測 JSON。
# 責任：只接受 workflow_dispatch 輸入、安裝 Chromium、執行單一 tenant/date/occupancy probe、稽核輸出後上傳短期 artifact。
# 關聯模組：scripts/bookingPriceProbe.js、lib/bookingPriceProbe/*、tests/bookingPriceProbe.unit.test.js。
# 關鍵流程：checkout → npm ci → unit test → install chromium → live probe → sanitized output audit → upload JSON artifact。
name: Booking Price Probe

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant key"
        required: true
        default: "goodday"
      booking_url:
        description: "Public booking URL. Example: https://booking.owlting.com/good.day"
        required: true
        default: "https://booking.owlting.com/good.day"
      start:
        description: "Check-in date YYYY-MM-DD"
        required: true
        default: "2026-06-02"
      end:
        description: "Check-out date YYYY-MM-DD"
        required: true
        default: "2026-06-03"
      adult:
        description: "Adult count"
        required: true
        default: "1"
      child:
        description: "Child count"
        required: false
        default: "0"
      infant:
        description: "Infant count"
        required: false
        default: "0"
      capture_window_ms:
        description: "Capture window in ms"
        required: false
        default: "3000"
      timeout_ms:
        description: "Probe timeout in ms"
        required: false
        default: "8000"

permissions:
  contents: read

concurrency:
  group: booking-price-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Booking Price Probe unit tests
        run: npm run test:booking-price-probe

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Booking Price Probe
        run: npm run probe:booking-price
        env:
          BOOKING_PRICE_PROBE_ENABLED: "1"
          BOOKING_PRICE_PROBE_TENANT: ${{ inputs.tenant }}
          BOOKING_PRICE_PROBE_BOOKING_URL: ${{ inputs.booking_url }}
          BOOKING_PRICE_PROBE_START: ${{ inputs.start }}
          BOOKING_PRICE_PROBE_END: ${{ inputs.end }}
          BOOKING_PRICE_PROBE_ADULT: ${{ inputs.adult }}
          BOOKING_PRICE_PROBE_CHILD: ${{ inputs.child }}
          BOOKING_PRICE_PROBE_INFANT: ${{ inputs.infant }}
          BOOKING_PRICE_PROBE_LANG: "zh_TW"
          BOOKING_PRICE_PROBE_OUT_DIR: "out"
          BOOKING_PRICE_PROBE_TIMEOUT_MS: ${{ inputs.timeout_ms }}
          BOOKING_PRICE_PROBE_CAPTURE_WINDOW_MS: ${{ inputs.capture_window_ms }}
          BOOKING_PRICE_PROBE_MAX_JSON_BYTES: "500000"
          BOOKING_PRICE_PROBE_MAX_JSON_RESPONSES: "20"
          BOOKING_PRICE_PROBE_MAX_CANDIDATES: "10"
          BOOKING_PRICE_PROBE_ALLOWLIST_ORIGINS: "https://booking.owlting.com,https://www.booking-owlnest.com"

      - name: Audit sanitized Booking Price Probe output
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const outDir = 'out';
          const files = fs.existsSync(outDir)
            ? fs.readdirSync(outDir).filter((name) => /^booking_price_probe_.*\.json$/.test(name))
            : [];

          if (!files.length) {
            throw new Error('No booking price probe output JSON found');
          }

          const banned = [
            'cookie',
            'authorization',
            'bearer',
            'token',
            'secret',
            'password',
            'email',
            'phone',
            'mobile',
            'order_no',
            'order_serial',
            'rawBody',
            'headers'
          ];

          for (const file of files) {
            const fullPath = path.join(outDir, file);
            const text = fs.readFileSync(fullPath, 'utf8').toLowerCase();

            for (const word of banned) {
              if (text.includes(word.toLowerCase())) {
                throw new Error(`Sanitized output audit failed: ${file} contains banned word ${word}`);
              }
            }
          }

          console.log(`sanitized output audit ok: ${files.join(', ')}`);
          NODE

      - name: Upload Booking Price Probe artifact
        uses: actions/upload-artifact@v6
        with:
          name: booking-price-probe-${{ inputs.tenant }}-${{ inputs.start }}-${{ inputs.end }}
          path: out/booking_price_probe_*.json
          if-no-files-found: error
          retention-days: 3
