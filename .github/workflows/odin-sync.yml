name: Odin Sync (Playwright)

on:
  workflow_dispatch:
  schedule:
    # ✅ 每天台北 00:00（= UTC 前一天 16:00）
    - cron: "0 16 * * *"
    # ✅ 每天台北 06:00（= UTC 前一天 22:00）
    - cron: "0 22 * * *"
    # ✅ 每天台北 12:00（= UTC 04:00）
    - cron: "0 4 * * *"
    # ✅ 每天台北 18:00（= UTC 10:00）
    - cron: "0 10 * * *"

concurrency:
  group: odin-sync
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Taipei
      ODIN_LANG: zh_tw
      ODIN_OUT_DIR: out

      # ✅ 預設以 ODIN_YEAR 全年度模式抓取（可在手動觸發時覆寫）
      ODIN_YEAR: ""
      ODIN_DAYS: "120"

      # ✅ 取消單過濾（會把取消單交給 GAS 刪除）
      ODIN_EXCLUDE_CANCELLED: "1"
      ODIN_CANCEL_STATUS: "cancelled,canceled,void,invalid"

      # ✅ 多館別輪巡節流（毫秒）
      ODIN_THROTTLE_MS: "250"

      # ✅ 預設：鏡像模式（只有 06:00 會開啟寫入 Sheet）
      ODIN_WRITE_SHEET: "0"

      # ✅ 增量（預設開）：只送變動 rows，降低 GAS 寫入量
      ODIN_CHANGED_ONLY: "1"
      ODIN_SNAPSHOT_PATH: "out/orders_last_snapshot_{hotelId}.json"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ✅ 先建立 out 目錄（cache restore 需要路徑存在）
      - name: Prepare out dir
        run: mkdir -p out

      # ✅ 確保 repo data 目錄存在（要 commit 用）
      - name: Prepare data dir
        run: mkdir -p data/odin/latest

      # ✅ 還原上一輪 snapshot（讓 changed-only 有「上一版」可比對）
      - name: Restore snapshot cache
        uses: actions/cache@v4
        with:
          path: out
          key: odin-snapshot-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            odin-snapshot-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Odin sync
        env:
          ODIN_EMAIL: ${{ secrets.ODIN_EMAIL }}
          ODIN_PASSWORD: ${{ secrets.ODIN_PASSWORD }}
          ODIN_HOTEL_IDS: ${{ secrets.ODIN_HOTEL_IDS }}

          # ✅ 只有在 ODIN_WRITE_SHEET=1 時才會用到（06:00 校正時段）
          ODIN_SHEET_WEBAPP_URL: ${{ secrets.ODIN_SHEET_WEBAPP_URL }}
          ODIN_SHEET_TOKEN: ${{ secrets.ODIN_SHEET_TOKEN }}
          ODIN_SPREADSHEET_ID: ${{ secrets.ODIN_SPREADSHEET_ID }}

          # ✅ 取消掃描開關（Actions Variables 設 ODIN_CANCEL_SCAN=1）
          ODIN_CANCEL_SCAN: ${{ vars.ODIN_CANCEL_SCAN }}

          # ✅ 可選：取消掃描要抓哪些狀態（沒設就走 repo 預設）
          ODIN_CANCEL_ORDER_STATUS: ${{ vars.ODIN_CANCEL_ORDER_STATUS }}

          # ✅ 可選：取消判斷字典（⚠️ 若 vars 沒設，會是空字串；下面會做保護）
          ODIN_CANCEL_STATUS_VAR: ${{ vars.ODIN_CANCEL_STATUS }}
        run: |
          echo "Event schedule: '${{ github.event.schedule }}'"
          echo "Runtime TZ=${TZ:-unset}, now=$(date '+%Y-%m-%d %H:%M:%S %z')"

          # ✅ vars 若沒設會是空字串：只有「有值」才覆蓋 job env 預設
          if [ -n "${ODIN_CANCEL_STATUS_VAR:-}" ]; then
            export ODIN_CANCEL_STATUS="${ODIN_CANCEL_STATUS_VAR}"
            echo "Override ODIN_CANCEL_STATUS from vars."
          else
            echo "Use default ODIN_CANCEL_STATUS from job env."
          fi

          # ✅ 若未指定 ODIN_YEAR，預設抓「台北時區今年整年」
          if [ -z "${ODIN_YEAR:-}" ]; then
            CURRENT_YEAR=$(date +%Y)
            ODIN_YEAR="${CURRENT_YEAR}"
            export ODIN_YEAR
            echo "Use full-year mode: ODIN_YEAR=${ODIN_YEAR}"
            echo "ODIN_YEAR=${ODIN_YEAR}" >> $GITHUB_ENV
          else
            export ODIN_YEAR
            echo "Use ODIN_YEAR from env/secrets: ${ODIN_YEAR}"
          fi

          # ✅ 依「觸發時段」覆寫策略
          # - 00:00 / 12:00 / 18:00：增量更新 + 只寫 JSON（不寫 Sheet）
          # - 06:00：校正（全量）+ 寫 Sheet（鏡像）
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 22 * * *")
                echo "Mode: CALIBRATE (06:00 Asia/Taipei) → full sync + write sheet"
                export ODIN_CHANGED_ONLY=0
                echo "ODIN_CHANGED_ONLY=0" >> $GITHUB_ENV

                export ODIN_WRITE_SHEET=1
                echo "ODIN_WRITE_SHEET=1" >> $GITHUB_ENV
                ;;
              *)
                echo "Mode: INCREMENTAL (00:00/12:00/18:00 Asia/Taipei) → changed-only + JSON only"
                export ODIN_CHANGED_ONLY=1
                echo "ODIN_CHANGED_ONLY=1" >> $GITHUB_ENV

                export ODIN_WRITE_SHEET=0
                echo "ODIN_WRITE_SHEET=0" >> $GITHUB_ENV
                ;;
            esac
          else
            echo "Mode: MANUAL → keep repo defaults (ODIN_WRITE_SHEET=${ODIN_WRITE_SHEET:-unset})"
          fi

          echo "ODIN_YEAR=${ODIN_YEAR:-unset}"
          echo "ODIN_CHANGED_ONLY=${ODIN_CHANGED_ONLY:-unset}"
          echo "ODIN_WRITE_SHEET=${ODIN_WRITE_SHEET:-unset}"
          echo "ODIN_CANCEL_SCAN=${ODIN_CANCEL_SCAN:-unset}"
          echo "ODIN_CANCEL_ORDER_STATUS=${ODIN_CANCEL_ORDER_STATUS:-unset}"

          npx playwright test tests/orderDetailCapture.spec.js --project=chromium --timeout=240000

      # ✅ 成功後：把 data/odin/latest 的 JSON commit 回 repo（SSOT）
      - name: Commit JSON to repo (data/odin/latest)
        if: success()
        run: |
          set -e

          echo "Preview data/odin/latest:"
          ls -al data/odin/latest || true

          # 只提交 data/odin/latest 的變更
          if [ -z "$(git status --porcelain data/odin/latest)" ]; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 避免 schedule/手動並發造成 push 衝突（concurrency 已降低機率，但再保險）
          git pull --rebase

          git add data/odin/latest

          TS=$(date '+%Y-%m-%d %H:%M:%S %z')
          git commit -m "chore(odin): update latest JSON (${TS})"

          git push

      # ✅ 成功才修剪：只保留「系統對照必需」的檔案，讓 cache 保持瘦身
      - name: Prune out (success only, keep key files)
        if: success()
        run: |
          echo "Before prune:"
          ls -al out || true

          find out -type f \
            ! -name "orders_last_snapshot_"'*'".json" \
            ! -name "orders_sheet_ready_"'*'".json" \
            ! -name "orders_sheet_ready_changed_"'*'".json" \
            ! -name "orders_calendar_list_raw_"'*'".json" \
            ! -name "orders_calendar_list_cancel_"'*'".json" \
            -delete

          echo "After prune:"
          ls -al out || true

      # ✅ 成功才寫回 cache：避免失敗時把「壞的/不完整的 out」覆蓋掉上一份可用 snapshot
      - name: Save snapshot cache (success only)
        if: success()
        uses: actions/cache@v4
        with:
          path: out
          key: odin-snapshot-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      # ✅ 只有失敗才上傳 artifact（debug 用），而且短保留，不會長胖
      - name: Upload artifacts (failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: odin-out-failure
          path: out
          retention-days: 3
