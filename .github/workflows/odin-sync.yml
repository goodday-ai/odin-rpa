name: Odin Sync (Playwright)

on:
  workflow_dispatch:
  schedule:
    # ✅ 每天 Asia/Taipei 03:00 = UTC 19:00（固定）
    - cron: "0 19 * * *"

# ✅ 避免同一時間重複執行（手動 + 排程撞在一起時很好用）
concurrency:
  group: odin-sync
  cancel-in-progress: true

# ✅ 最小權限（本流程只需要 checkout 讀 repo）
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      # =========================
      # ✅ 基本參數（必要時你再改）
      # =========================
      ODIN_LANG: zh_tw
      ODIN_DAYS: "90"
      ODIN_OUT_DIR: "out"

      # 不填就由程式用 Asia/Taipei 今日（建議保留空白，讓它每天自動變）
      # ODIN_START_DATE: "2026-02-27"

      # =========================
      # ✅ 取消單過濾
      # =========================
      ODIN_EXCLUDE_CANCELLED: "1"
      ODIN_CANCEL_STATUS: "cancelled,canceled,void,invalid"

      # =========================
      # ✅ 多館別輪巡節流（毫秒）
      # =========================
      ODIN_THROTTLE_MS: "250"

      # =========================
      # ✅ 增量（先關掉；等你要用 snapshot 再開）
      # =========================
      ODIN_CHANGED_ONLY: "0"
      # ODIN_SNAPSHOT_PATH: "out/orders_last_snapshot_{hotelId}.json"

      # =========================
      # ✅ 策略一：抓完直接寫入 Google Sheet（GAS）
      # =========================
      ODIN_WRITE_SHEET: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Odin sync
        env:
          # ✅ Owlting 登入
          ODIN_EMAIL: ${{ secrets.ODIN_EMAIL }}
          ODIN_PASSWORD: ${{ secrets.ODIN_PASSWORD }}

          # ✅ 多館別（逗號清單）
          ODIN_HOTEL_IDS: ${{ secrets.ODIN_HOTEL_IDS }}

          # ✅ GAS Web App（策略一）
          ODIN_SHEET_WEBAPP_URL: ${{ secrets.ODIN_SHEET_WEBAPP_URL }}
          ODIN_SHEET_TOKEN: ${{ secrets.ODIN_SHEET_TOKEN }}
          ODIN_SPREADSHEET_ID: ${{ secrets.ODIN_SPREADSHEET_ID }}
        run: |
          npx playwright test tests/orderDetailCapture.spec.js --project=chromium --timeout=240000

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: odin-out
          path: out
