name: Odin Sync (Playwright)

on:
  workflow_dispatch:
  schedule:
    # ✅ Asia/Taipei 00:00 = UTC 16:00（前一天）
    - cron: "0 16 * * *"
    # ✅ Asia/Taipei 06:00 = UTC 22:00（前一天）→ 校正（全量）
    - cron: "0 22 * * *"
    # ✅ Asia/Taipei 12:00 = UTC 04:00
    - cron: "0 4 * * *"

concurrency:
  group: odin-sync
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ODIN_LANG: zh_tw
      ODIN_OUT_DIR: out

      # ✅ 預設以 ODIN_YEAR 全年度模式抓取（可在手動觸發時覆寫）
      ODIN_YEAR: ""
      ODIN_DAYS: "120"

      # ✅ 取消單過濾（會把取消單交給 GAS 刪除）
      ODIN_EXCLUDE_CANCELLED: "1"
      ODIN_CANCEL_STATUS: "cancelled,canceled,void,invalid"

      # ✅ 多館別輪巡節流（毫秒）
      ODIN_THROTTLE_MS: "250"

      # ✅ 策略一：抓完直接寫入 Google Sheet（GAS）
      ODIN_WRITE_SHEET: "1"

      # ✅ 增量（預設開）：只送變動 rows，降低 GAS 寫入量
      ODIN_CHANGED_ONLY: "1"
      ODIN_SNAPSHOT_PATH: "out/orders_last_snapshot_{hotelId}.json"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Odin sync
        env:
          ODIN_EMAIL: ${{ secrets.ODIN_EMAIL }}
          ODIN_PASSWORD: ${{ secrets.ODIN_PASSWORD }}
          ODIN_HOTEL_IDS: ${{ secrets.ODIN_HOTEL_IDS }}
          ODIN_SHEET_WEBAPP_URL: ${{ secrets.ODIN_SHEET_WEBAPP_URL }}
          ODIN_SHEET_TOKEN: ${{ secrets.ODIN_SHEET_TOKEN }}
          ODIN_SPREADSHEET_ID: ${{ secrets.ODIN_SPREADSHEET_ID }}
        run: |
          echo "Event schedule: '${{ github.event.schedule }}'"

          # ✅ 若未指定 ODIN_YEAR，預設抓「台北時區今年整年」
          # 注意：寫入 $GITHUB_ENV 只會影響「後續 step」，
          # 同一步要立刻生效需要 export。
          if [ -z "${ODIN_YEAR:-}" ]; then
            CURRENT_YEAR=$(TZ=Asia/Taipei date +%Y)
            ODIN_YEAR="${CURRENT_YEAR}"
            export ODIN_YEAR
            echo "Use full-year mode: ODIN_YEAR=${ODIN_YEAR}"
            echo "ODIN_YEAR=${ODIN_YEAR}" >> $GITHUB_ENV
          else
            export ODIN_YEAR
            echo "Use ODIN_YEAR from env/secrets: ${ODIN_YEAR}"
          fi

          # ✅ 依「觸發時段」覆寫策略
          # - 00:00 / 12:00：增量更新（ODIN_CHANGED_ONLY=1）
          # - 06:00：校正（全量），把 snapshot 重新對齊，順便清掉歷史取消單殘留
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 22 * * *")
                echo "Mode: CALIBRATE (06:00 Asia/Taipei) → full sync"
                ODIN_CHANGED_ONLY=0
                export ODIN_CHANGED_ONLY
                echo "ODIN_CHANGED_ONLY=0" >> $GITHUB_ENV
                ;;
              *)
                echo "Mode: INCREMENTAL (00:00/12:00 Asia/Taipei) → changed-only"
                ODIN_CHANGED_ONLY=1
                export ODIN_CHANGED_ONLY
                echo "ODIN_CHANGED_ONLY=1" >> $GITHUB_ENV
                ;;
            esac
          else
            echo "Mode: MANUAL → keep repo defaults"
          fi

          npx playwright test tests/orderDetailCapture.spec.js --project=chromium --timeout=240000

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: odin-out
          path: out
