name: Odin Sync (Playwright)

on:
  workflow_dispatch:
  schedule:
    # ✅ 每天台北 00:00（= UTC 前一天 16:00）
    - cron: "0 16 * * *"
    # ✅ 每天台北 06:00（= UTC 前一天 22:00）
    - cron: "0 22 * * *"
    # ✅ 每天台北 12:00（= UTC 04:00）
    - cron: "0 4 * * *"
    # ✅ 每天台北 18:00（= UTC 10:00）
    - cron: "0 10 * * *"

concurrency:
  group: odin-sync
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Taipei
      ODIN_LANG: zh_tw
      ODIN_OUT_DIR: out

      # ✅ 預設以 ODIN_YEAR 全年度模式抓取（可在手動觸發時覆寫）
      ODIN_YEAR: ""
      ODIN_DAYS: "120"

      # ✅ 取消單過濾（正常單那輪會把取消單排除）
      ODIN_EXCLUDE_CANCELLED: "1"
      ODIN_CANCEL_STATUS: "cancelled,canceled,void,invalid"

      # ✅ 多館別輪巡節流（毫秒）
      ODIN_THROTTLE_MS: "250"

      # ✅ 強制：永遠寫入 Sheet
      ODIN_WRITE_SHEET: "1"

      # ✅ 強制：永遠跑取消單掃描（第二輪）
      # ✅ Odin 真實 API：order_status=cancel
      ODIN_CANCEL_SCAN: "1"
      ODIN_CANCEL_ORDER_STATUS: "cancel"

      # ✅ 增量（預設開）：只送變動 rows，降低 GAS 寫入量
      ODIN_CHANGED_ONLY: "1"
      ODIN_SNAPSHOT_PATH: "out/orders_last_snapshot_{hotelId}.json"

      # ✅ 把 SSOT 推到不觸發 Production 的分支（你 repo 用這個當 SSOT 存放）
      ODIN_DATA_BRANCH: "odin-data"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Prepare dirs
        run: |
          mkdir -p out
          mkdir -p data/odin/latest
          mkdir -p data/odin/cache

      # ✅ 關鍵：排程永遠從預設分支起跑，先把 odin-data 的最新 JSON 帶回 workspace
      # 目的：避免 detail cache 每次被重置，或把既有 JSON 誤刪
      - name: Restore latest SSOT data from odin-data branch
        run: |
          git fetch origin "${ODIN_DATA_BRANCH}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${ODIN_DATA_BRANCH}"; then
            git checkout "origin/${ODIN_DATA_BRANCH}" -- data/odin || true
            echo "Restored data/odin from origin/${ODIN_DATA_BRANCH}."
          else
            echo "origin/${ODIN_DATA_BRANCH} not found yet; start with local data/odin."
          fi

          echo "After restore - latest:"
          ls -al data/odin/latest || true
          echo "After restore - cache:"
          ls -al data/odin/cache || true

      # ✅ 補強 1：SSOT cache 健檢
      # - 遇到 0 bytes 或非法 JSON 的 detail_cache_* → 直接刪掉，避免壞 cache 讓流程「看似成功但其實讀到髒資料」
      - name: Validate & prune broken SSOT cache
        run: |
          set -e

          CACHE_DIR="data/odin/cache"
          if [ ! -d "${CACHE_DIR}" ]; then
            echo "No ${CACHE_DIR} dir, skip."
            exit 0
          fi

          echo "Validate SSOT cache json in ${CACHE_DIR} ..."
          bad=0

          shopt -s nullglob
          for f in "${CACHE_DIR}"/detail_cache_*.json; do
            # 0 bytes → 壞檔
            if [ ! -s "${f}" ]; then
              echo "⚠️ remove empty cache: ${f}"
              rm -f "${f}"
              bad=$((bad + 1))
              continue
            fi

            # 非法 JSON → 壞檔（用 node 解析，環境保證有 node）
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "${f}" >/dev/null 2>&1 || {
              echo "⚠️ remove invalid json: ${f}"
              rm -f "${f}"
              bad=$((bad + 1))
            }
          done

          echo "SSOT cache validate done. removed=${bad}"
          echo "After validate - cache:"
          ls -al "${CACHE_DIR}" || true

      # ✅ Playwright browsers cache：一定要在 npm ci 之前 restore
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ms-playwright-${{ runner.os }}-

      # ✅ 安裝 npm 套件時，直接禁止 Playwright 在 postinstall 自行下載 browsers
      - name: Install deps
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      # ✅ cache miss 才裝 browsers（避免每次重下載）
      # 注意：不帶 --with-deps 比較不會每次去動系統套件；若你確定缺依賴會炸，再加回 --with-deps
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Skip Playwright install (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: echo "Playwright browser cache hit, skip install."

      - name: Run Odin sync
        env:
          ODIN_EMAIL: ${{ secrets.ODIN_EMAIL }}
          ODIN_PASSWORD: ${{ secrets.ODIN_PASSWORD }}
          ODIN_HOTEL_IDS: ${{ secrets.ODIN_HOTEL_IDS || vars.ODIN_HOTEL_IDS }}

          ODIN_SHEET_WEBAPP_URL: ${{ secrets.ODIN_SHEET_WEBAPP_URL }}
          ODIN_SHEET_TOKEN: ${{ secrets.ODIN_SHEET_TOKEN }}
          ODIN_SPREADSHEET_ID: ${{ secrets.ODIN_SPREADSHEET_ID }}
        run: |
          echo "Event schedule: '${{ github.event.schedule }}'"
          echo "Runtime TZ=${TZ:-unset}, now=$(date '+%Y-%m-%d %H:%M:%S %z')"

          # ✅ 若未指定 ODIN_YEAR，預設抓「台北時區今年整年」
          if [ -z "${ODIN_YEAR:-}" ]; then
            CURRENT_YEAR=$(date +%Y)
            ODIN_YEAR="${CURRENT_YEAR}"
            export ODIN_YEAR
            echo "Use full-year mode: ODIN_YEAR=${ODIN_YEAR}"
            echo "ODIN_YEAR=${ODIN_YEAR}" >> $GITHUB_ENV
          else
            export ODIN_YEAR
            echo "Use ODIN_YEAR from env/secrets: ${ODIN_YEAR}"
          fi

          # ✅ 強制寫入 + 強制取消掃描（避免任何情境被覆寫成 OFF）
          export ODIN_WRITE_SHEET=1
          export ODIN_CANCEL_SCAN=1
          export ODIN_CANCEL_ORDER_STATUS=cancel

          echo "ODIN_YEAR=${ODIN_YEAR:-unset}"
          echo "ODIN_CHANGED_ONLY=${ODIN_CHANGED_ONLY:-unset}"
          echo "ODIN_WRITE_SHEET=${ODIN_WRITE_SHEET:-unset}"
          echo "ODIN_CANCEL_SCAN=${ODIN_CANCEL_SCAN:-unset}"
          echo "ODIN_CANCEL_ORDER_STATUS=${ODIN_CANCEL_ORDER_STATUS:-unset}"

          npx playwright test tests/orderDetailCapture.spec.js --project=chromium --timeout=240000

          # ✅ 補強 2：GAS 回應若有 deleteError / ok=false → 直接 fail
          # 依你目前的輸出習慣：out 裡會有 orders_sheet_ready_*.json（或 changed 版本）
          # 這裡掃描所有相關檔案，只要發現 error 就 exit 1
          echo "Post-check: scan out/*sheet_ready*.json for GAS errors..."

          node - <<'NODE'
          const fs = require('fs')
          const path = require('path')

          function listFiles(dir) {
            try { return fs.readdirSync(dir).map(f => path.join(dir, f)) } catch { return [] }
          }

          const outDir = path.resolve('out')
          const files = listFiles(outDir).filter(f =>
            /orders_sheet_ready_.*\.json$/.test(path.basename(f)) ||
            /orders_sheet_ready_changed_.*\.json$/.test(path.basename(f))
          )

          let bad = []
          for (const f of files) {
            let txt = ''
            try { txt = fs.readFileSync(f, 'utf8') } catch { continue }
            if (!txt.trim()) continue

            let data
            try { data = JSON.parse(txt) } catch { continue }

            // 寬鬆掃描：只要任一層物件出現 ok=false 或 deleteError 非空字串就視為異常
            const stack = [data]
            while (stack.length) {
              const cur = stack.pop()
              if (cur && typeof cur === 'object') {
                if (cur.ok === false) bad.push({ file: f, reason: 'ok=false' })
                if (typeof cur.deleteError === 'string' && cur.deleteError.trim()) bad.push({ file: f, reason: `deleteError=${cur.deleteError}` })
                for (const k of Object.keys(cur)) stack.push(cur[k])
              }
            }
          }

          if (bad.length) {
            console.error('🚨 GAS error detected in out json:', bad.slice(0, 20))
            process.exit(1)
          }
          console.log('✅ GAS error scan passed.')
          NODE

      # ✅ 新增：把 Playwright 產生的 JSON 同步到 SSOT
      - name: Sync JSON → SSOT data/odin/latest
        run: |
          echo "Sync JSON → SSOT data/odin/latest"

          mkdir -p data/odin/latest

          rsync -av \
            --include="orders_sheet_ready_*.json" \
            --include="orders_sheet_ready_changed_*.json" \
            --exclude="*" \
            out/ \
            data/odin/latest/

          echo "After sync:"
          ls -al data/odin/latest || true

      # ✅ 穩定推送：使用 worktree 處理 odin-data（不在主工作目錄切分支，避免 checkout 覆寫變更）
      - name: Publish SSOT JSON to odin-data branch (safe via worktree)
        if: success()
        run: |
          echo "Preview data/odin/latest:"
          ls -al data/odin/latest || true
          echo "Preview data/odin/cache:"
          ls -al data/odin/cache || true

          # ✅ 診斷 0：workspace 這次到底有沒有動到 data/odin
          echo "=== Workspace data/odin status ==="
          git status --porcelain data/odin || true

          if [ -z "$(git status --porcelain data/odin)" ]; then
            echo "No data changes to commit (workspace)."
            exit 0
          fi

          git config user.name "odin-sync-bot"
          git config user.email "odin-sync-bot@users.noreply.github.com"

          git fetch origin "${ODIN_DATA_BRANCH}" || true

          WT_DIR="../_odin_data_worktree"
          rm -rf "${WT_DIR}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${ODIN_DATA_BRANCH}"; then
            echo "Worktree: checkout existing origin/${ODIN_DATA_BRANCH}"
            git worktree add --force "${WT_DIR}" "origin/${ODIN_DATA_BRANCH}"
          else
            echo "Worktree: create new branch ${ODIN_DATA_BRANCH}"
            git worktree add --force -b "${ODIN_DATA_BRANCH}" "${WT_DIR}"
          fi

          mkdir -p "${WT_DIR}/data/odin"
          rsync -a --delete "data/odin/" "${WT_DIR}/data/odin/"

          cd "${WT_DIR}"

          # ✅ 診斷 1：worktree 現在到底在哪個 commit（確認真的是 odin-data 的 HEAD）
          echo "=== SSOT worktree HEAD ==="
          git --no-pager log -1 --oneline || true

          # ✅ ✅ 鐵證級診斷（你要的兩行核心）
          echo "=== SSOT worktree status (porcelain) ==="
          git status --porcelain || true
          echo "=== SSOT worktree diff summary ==="
          git --no-pager diff --stat || true

          git add data/odin

          # ✅ 診斷 2：add 之後再看一次（避免你懷疑是 staging 沒吃到）
          echo "=== SSOT staged status ==="
          git status --porcelain || true
          echo "=== SSOT staged diff summary ==="
          git --no-pager diff --cached --stat || true

          if [ -z "$(git status --porcelain)" ]; then
            echo "No SSOT changes after rsync (worktree is identical to origin)."
            cd -
            exit 0
          fi

          git commit -m "chore(odin): update SSOT JSON ($(date '+%Y-%m-%d %H:%M:%S %z'))"
          git push -u origin HEAD:"${ODIN_DATA_BRANCH}"

          cd -

      - name: Prune out (success only, keep key files)
        if: success()
        run: |
          echo "Before prune:"
          ls -al out || true

          find out -type f \
            ! -name "orders_last_snapshot_"'*'".json" \
            ! -name "orders_sheet_ready_"'*'".json" \
            ! -name "orders_sheet_ready_changed_"'*'".json" \
            ! -name "orders_calendar_list_raw_"'*'".json" \
            ! -name "orders_calendar_list_cancel_"'*'".json" \
            -delete

          echo "After prune:"
          ls -al out || true

      - name: Upload artifacts (failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: odin-out-failure
          path: out
          retention-days: 3
